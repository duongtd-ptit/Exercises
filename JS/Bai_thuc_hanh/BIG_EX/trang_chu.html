<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLB Tín Nguyện - Chùa Cổ Am</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <img src="pic/hinh_nen_chinh.jpg" alt="Ảnh tập thể CLB Tín Nguyện" class="header-banner">

        <nav class="navbar">
            <a href="#">Trang chủ</a>
            <a href="gioi_thieu.html">Giới thiệu & Lịch sử</a>
            <a href="su_kien.html">Sự kiện sắp tới</a>
            <a href="tuyen_thanh_vien.html">Đăng ký thành viên</a>
        </nav>

        <main class="main-content">
            <h2 class="section-title">Sự kiện nổi bật</h2>

            <!-- Thẻ chứa này sẽ được JS tự động "bơm" bài viết vào -->
            <div class="activity-grid" id="noiBatContainer">
                <p style="text-align: center; grid-column: 1/-1;">Đang tải dữ liệu...</p>
            </div>
        </main>

        <footer>
            <strong>CÂU LẠC BỘ TÍN NGUYỆN - Chùa Cổ Am</strong><br>
            Địa chỉ: Chùa Cổ Am, Liên Phương, Hưng Yên<br>
            Fanpage : Tín Nguyện Volunteer club | Hotline: 0965.632.392<br>
            <br>
            <i>"Đi để cống hiến - Sống để yêu thương"</i>
        </footer>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            fetch('http://127.0.0.1:3000/api/su-kien')
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('noiBatContainer');
                    container.innerHTML = '';

                    const noiBatEvents = data.filter(item => item.category === 'noi_bat');

                    if (noiBatEvents.length === 0) {
                        container.innerHTML = '<p style="text-align:center; grid-column: 1/-1; color: #777;">Hiện chưa có sự kiện nổi bật nào.</p>';
                        return;
                    }

                    noiBatEvents.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'activity-card';

                        const hinhAnh = item.image_url ? item.image_url : 'pic/hinh_nen_chinh.jpg';

                        // KIỂM TRA TRẠNG THÁI LINK FACEBOOK
                        const linkFB = item.fb_url ? item.fb_url : 'javascript:void(0)';
                        const targetAttr = item.fb_url ? '_blank' : '_self';
                        const clickAction = item.fb_url ? '' : 'onclick="alert(\'Bài viết này hiện chưa có link Facebook chi tiết!\')"';

                        card.innerHTML = `
                        <img src="${hinhAnh}" alt="${item.title}" onerror="this.src='pic/hinh_nen_chinh.jpg'">
                        <div class="card-content">
                            <h3>${item.title}</h3>
                            <span class="date-tag">📅 ${item.event_date} - ${item.location || 'Chùa Cổ Am'}</span>
                            <p>${item.description}</p>
                            <a href="${linkFB}" target="${targetAttr}" ${clickAction} class="btn-join">Xem thêm >></a>
                        </div>
                    `;
                        container.appendChild(card);
                    });
                })
                .catch(err => {
                    console.error("Lỗi:", err);
                    document.getElementById('noiBatContainer').innerHTML = '<p style="text-align:center; grid-column: 1/-1; color: red;">Không thể kết nối đến máy chủ!</p>';
                });
        });
    </script>
</body>

</html>
