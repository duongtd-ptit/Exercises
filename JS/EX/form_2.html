<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thiết kế Form đơn giản</title>
    <style>
        /* CSS cơ bản để căn giữa và tạo màu */
        body {
            font-family: "Times New Roman", Times, serif;
            /* Phông chữ giống trong ảnh */
            display: flex;
            justify-content: center;
        }

        form {
            width: 600px;
            /* Độ rộng của form */
            border: 1px solid #ccc;
            /* Viền mờ bao quanh (tuỳ chọn) */
            padding: 10px;
        }

        .header,
        .footer {
            background-color: #f39c12;
            /* Màu cam */
            color: #8d4a13;
            /* Màu chữ nâu đậm */
            text-align: center;
            font-weight: bold;
            padding: 10px;
            text-transform: uppercase;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            padding: 10px;
            vertical-align: top;
            /* Căn lề trên cho các dòng như Textarea */
        }

        /* Cột bên trái (Label) */
        td:first-child {
            width: 30%;
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select,
        textarea {
            width: 95%;
            /* Chiều rộng ô nhập liệu */
            padding: 5px;
        }
    </style>
</head>

<body>

    <form action="" method="get">
        <div class="header">
            PT Ứng dụng Web - THIẾT KẾ FORM ĐƠN GIẢN
        </div>

        <table>
            <tr>
                <td>Họ và tên</td>
                <td><input type="text" name="hoten"></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="email" name="email"></td>
            </tr>
            <tr>
                <td>Số điện thoại</td>
                <td><input type="tel" name="sdt"></td>
            </tr>
            <tr>
                <td>Quê quán</td>
                <td>
                    <select name="quequan">
                        <option value="">--Chọn thành phố--</option>
                        <option value="hn">Hà Nội</option>
                        <option value="sg">TP. Hồ Chí Minh</option>
                        <option value="dn">Đà Nẵng</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Giới tính</td>
                <td>
                    <input type="radio" name="gioitinh" value="nam" id="nam"> <label for="nam">Nam</label>
                    <input type="radio" name="gioitinh" value="nu" id="nu"> <label for="nu">Nữ</label>
                </td>
            </tr>
            <tr>
                <td>Kỹ năng</td>
                <td>
                    <input type="checkbox" name="skill" value="html"> HTML
                    <input type="checkbox" name="skill" value="css"> CSS
                    <input type="checkbox" name="skill" value="js"> JS
                    <input type="checkbox" name="skill" value="bootstrap"> BOOTSTRAP
                </td>
            </tr>
            <tr>
                <td>Ngày sinh</td>
                <td><input type="date" name="ngaysinh"></td>
            </tr>
            <tr>
                <td>Giới thiệu bản thân</td>
                <td>
                    <textarea name="gioithieu" rows="5"></textarea>
                </td>
            </tr>
        </table>

        <div class="footer">
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </div>
    </form>

</body>

</html>
